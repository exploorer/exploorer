<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сюрприз</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #0a0f1e, #1a1a2e);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 16px;
            color: #94a3b8;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 18px 48px;
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            background: linear-gradient(135deg, #ec4899, #f43f5e);
            border: none;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            box-shadow: 0 8px 24px rgba(236, 72, 153, 0.35);
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.04);
            box-shadow: 0 12px 32px rgba(236, 72, 153, 0.5);
        }

        .btn:active {
            transform: scale(0.96);
        }

        .emoji-big {
            font-size: 56px;
            margin-bottom: 20px;
            display: block;
        }

        .footer {
            margin-top: 30px;
            font-size: 13px;
            color: #475569;
        }

        .footer a {
            color: #64748b;
            text-decoration: none;
        }

        .footer a:hover {
            color: #94a3b8;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">
        <span class="emoji-big">🎁</span>
        <h1>Ты готов?</h1>
        <p class="subtitle">
            Нажми на кнопку — и тебя ждёт сюрприз.<br>
            Обещаю, ты не пожалеешь 😏
        </p>

        <!-- Кнопка ведёт на Rickroll -->
        <a href="https://rutube.ru/video/be9b5aece2911aecc68fa03942e25bac/" target="_blank" class="btn">
            👆 Нажми меня
        </a>

        <p class="footer">
            Сделано с ❤️ и чувством юмора<br>
            <span style="font-size: 12px;">(никаких вирусов, только классика)</span>
        </p>
    </div>

</body>
</html>
